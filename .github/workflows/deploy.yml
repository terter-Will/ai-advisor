name: Deploy to Ubuntu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Web
        run: |
          cd web
          npm install
          npm run build
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            # 1. 更新後端
            cd /var/www/aiadvisor/api
            git pull origin main
            source .venv/bin/activate
            pip install fastapi uvicorn pymysql python-dotenv httpx python-docx
            sudo systemctl restart aiadvisor-api.service

      - name: Copy Built Files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "web/dist/*"
          target: "/var/www/aiadvisor/dist"
          strip_components: 2 # 確保 dist 裡面的檔案直接放到 /var/www/aiadvisor/dist/ 底下（對齊 nginx root 設定）