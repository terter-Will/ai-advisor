name: Deploy to Ubuntu

on:
  push:
    branches:
      - main # 當有程式碼推送到 main 分支時自動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} # 如果你是用密碼登入
          script: |
            # 1. 更新後端並重啟
            cd /var/www/aiadvisor_api
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart aiadvisor-api.service
            
            # 2. 更新前端並重新打包
            cd /var/www/aiadvisor_web
            git pull origin main
            npm install
            npm run build
            sudo cp -r dist/* /var/www/aiadvisor/